[pytest]
;mockyshop-playground (где лежит tests/)
;не был в sys.path при запуске pytest из mockyshop/backend/.
;pythonpath = ../../ добавляет корень проекта в sys.path,
;и from tests.config import AuthConfig теперь находит модуль.
;AuthConfig() при этом читает поля из tests/.env (указан в env_file).
pythonpath = ../../
addopts = --headed
asyncio_mode = auto
markers =
    e2e: end-to-end tests with Playwright
    authorization: authorization tests
