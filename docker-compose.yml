services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: online_store
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/online_store
    ports:
      - "8000:8000"
    volumes:
      - static_data:/app/static
      - ./backend/app:/app/app
      - ./backend/alembic.ini:/app/alembic.ini
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && python app/seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"


  frontend:
    build:
      context: ./frontend
      args:
        API_PROXY_URL: http://backend:8000
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ""
    ports:
      - "3003:3000"
    depends_on:
      - backend
    restart: unless-stopped


  nginx:
    image: nginx:alpine
    ports:
      - "88:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/static:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3


volumes:
  postgres_data:
  static_data: